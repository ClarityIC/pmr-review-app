steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--build-arg'
      - 'GOOGLE_CLIENT_ID=643927424109-fapdkevkh88tobt5mti3cpbie212riva.apps.googleusercontent.com'
      - '-t'
      - 'us-central1-docker.pkg.dev/cic-prior-records-review/pmr-images/pmr-review-app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/cic-prior-records-review/pmr-images/pmr-review-app:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/cic-prior-records-review/pmr-images/pmr-review-app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pmr-review-app
      - '--image=us-central1-docker.pkg.dev/cic-prior-records-review/pmr-images/pmr-review-app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--timeout=3600'         # max request timeout (keeps SSE alive up to 1 hour)
      - '--no-cpu-throttling'    # CPU always allocated — background pipeline keeps running after HTTP response
      - '--min-instances=1'      # never scale to zero — instance stays alive between requests
      - '--use-http2'             # enables end-to-end HTTP/2
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/cic-prior-records-review/pmr-images/pmr-review-app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/cic-prior-records-review/pmr-images/pmr-review-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
